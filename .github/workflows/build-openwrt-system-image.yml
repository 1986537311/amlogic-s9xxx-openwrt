name: Build OpenWrt System image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Build OpenWrt
        run: |
          ./build.sh

      - name: Upload firmware
        uses: actions/upload-artifact@main
        with:
          name: OpenWrt_Firmware
          path: ./out/*.img
