name: Simple OpenWrt Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential libncurses5-dev libssl-dev gettext unzip wget curl file

      - name: Clone build repo
        run: |
          git clone --depth 1 https://github.com/ophub/amlogic-s9xxx-openwrt.git build
          cd build

      - name: Build firmware
        run: |
          cd build
          ./build.sh s905d -k 6.1.8

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_S905D
          path: ./build/output/*.img.gz
