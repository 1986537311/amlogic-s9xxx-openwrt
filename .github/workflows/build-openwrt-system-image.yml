# 已彻底移除所有Release上传步骤，仅保留编译+Artifacts上传，100%避免403错误
name: Build OpenWrt System image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Initialize the build environment
        uses: ./.github/actions/init-env

      - name: Create virtual disk for extended storage
        uses: ./.github/actions/extend-disk

      - name: Clone source code
        run: |
          git clone https://github.com/ophub/amlogic-s9xxx-openwrt.git openwrt
          cd openwrt
          git checkout main

      - name: Load custom feeds
        run: |
          [ -e feeds.conf ] && mv feeds.conf openwrt/feeds.conf.default
          chmod +x diy-part1.sh
          cd openwrt
          $GITHUB_WORKSPACE/diy-part1.sh

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e .config ] && mv .config openwrt/.config
          chmod +x diy-part2.sh
          cd openwrt
          $GITHUB_WORKSPACE/diy-part2.sh

      - name: Download package
        run: |
          cd openwrt
          make defconfig
          make download -j8

      - name: Compile the OpenWrt firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 || make -j1 V=s

      - name: Package OpenWrt for target boards
        run: |
          cd openwrt
          ./scripts/pack_image.sh

      - name: Upload firmware to Artifacts
        uses: actions/upload-artifact@main
        with:
          name: OpenWrt_${{ github.sha }}
          path: ./openwrt/bin/targets/*/*/*.img
