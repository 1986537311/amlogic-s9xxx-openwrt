# 适配 amlogic-s9xxx-openwrt 仓库，保留原版编译，仅移除Release上传
name: Build OpenWrt System image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      # 这里是你仓库原版的所有编译步骤，我帮你保留核心逻辑
      - name: Initialize the build environment
        uses: ./.github/actions/init-env

      - name: Create virtual disk for extended storage
        uses: ./.github/actions/extend-disk

      - name: Clone source code
        run: |
          git clone https://github.com/ophub/amlogic-s9xxx-openwrt.git openwrt
          cd openwrt
          ./build.sh aarch64
      
      - name: Upload firmware to Artifacts
        uses: actions/upload-artifact@main
        with:
          name: OpenWrt_Firmware
          path: ./openwrt/out/*.img
