env:
  FEEDS_CONF: config/${{ inputs.source_branch }}/feeds.conf.default
  DIY_P1_SH: config/${{ inputs.source_branch }}/diy-part1.sh
  DIY_P2_SH: config/${{ inputs.source_branch }}/diy-part2.sh
  CCACHE_DIR: /builder/openwrt/.ccache

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize the build environment
        run: |
          echo "Installing required packages..."
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libssl-dev git-core gettext unzip wget curl
          echo "Environment initialized successfully."

      - name: Create virtual disk for extended storage
        run: |
          echo "Creating virtual disk..."
          mkdir -p /builder
          sudo fallocate -l 25G /builder.img
          sudo mkfs.ext4 /builder.img
          sudo mount /builder.img /builder
          sudo chown -R runner:runner /builder
          echo "Virtual disk created."

      - name: Clone source code
        run: |
          echo "Cloning OpenWrt source..."
          git clone https://github.com/ophub/amlogic-s9xxx-openwrt.git openwrt
          cd openwrt
          echo "Source code cloned successfully."

      - name: Load custom feeds
        run: |
          [ -f "${{ env.FEEDS_CONF }}" ] && cp -f ${{ env.FEEDS_CONF }} openwrt/feeds.conf.default
          chmod +x ${{ env.DIY_P1_SH }}
          ${{ env.DIY_P1_SH }}

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -f ".config" ] && cp -f .config openwrt/.config
          chmod +x ${{ env.DIY_P2_SH }}
          ${{ env.DIY_P2_SH }}

      - name: Download package
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc)

      - name: Compile the OpenWrt firmware
        run: |
          cd openwrt
          echo "Compiling with $(nproc) threads..."
          make -j$(nproc) || make -j1 || make -j1 V=s

      - name: Organize firmware files
        run: |
          cd openwrt
          mkdir -p output
          cp bin/targets/*/*/*.img.gz output/

      - name: Upload firmware to Artifacts
        uses: actions/upload-artifact@main
        with:
          name: OpenWrt_Firmware_${{ github.sha }}
          path: ./openwrt/output/*.img.gz
